version: '3.8'

services:
  # MongoDB for Notification, Ride, Review services
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: notification
    volumes:
      - mongodb_data:/data/db
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Auth, User, Booking, Payment, Pricing, Driver services
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cab_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cab-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cab-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - BOOKING_SERVICE_URL=http://booking-service:3002
      - RIDE_SERVICE_URL=http://ride-service:3003
      - PRICING_SERVICE_URL=http://pricing-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - JWT_PUBLIC_KEY=$JWT_PUBLIC_KEY
    depends_on:
      - redis
    networks:
      - cab-network

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
      - JWT_PRIVATE_KEY=$JWT_PRIVATE_KEY
      - JWT_PUBLIC_KEY=$JWT_PUBLIC_KEY
      - JWT_EXPIRES_IN=1d
      - REFRESH_TOKEN_EXPIRES_IN=7d
      # Các biến bắt buộc mà auth-service kiểm tra khi khởi động
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=super_secret_access_key_for_cab_system_dev_32chars
      - JWT_REFRESH_SECRET=super_secret_refresh_key_for_cab_system_dev_32chars
      - KAFKA_BROKERS=kafka:9092
      - NODE_ENV=development
    depends_on:
      - postgres
      - redis
    networks:
      - cab-network

  booking-service:
    build:
      context: ./services/booking-service
    container_name: booking-service
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - cab-network

  ride-service:
    build:
      context: ./services/ride-service
    container_name: ride-service
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - cab-network

  pricing-service:
    build:
      context: ./services/pricing-service
    container_name: pricing-service
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
      # pricing-service đọc kết nối DB qua các biến PG riêng lẻ
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=cab_booking
      - KAFKA_BROKERS=kafka:9092
      - NODE_ENV=development
    depends_on:
      - postgres
      - kafka
    networks:
      - cab-network

  payment-service:
    build:
      context: ./services/payment-service
    container_name: payment-service
    environment:
      - PORT=3005
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - cab-network

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    environment:
      - PORT=3006
      - MONGO_URI=mongodb://admin:password@mongodb:27017/notification
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - mongodb
      - kafka
    networks:
      - cab-network

  driver-service:
    build:
      context: ./services/driver-service
    container_name: driver-service
    environment:
      - PORT=3007
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
    depends_on:
      - postgres
    networks:
      - cab-network

  review-service:
    build:
      context: ./services/review-service
    container_name: review-service
    environment:
      - PORT=3008
      # Thêm ?authSource=admin để xác thực đúng quyền root của MongoDB
      - MONGO_URI=mongodb://admin:password@mongodb:27017/review?authSource=admin
      - MONGO_DB_NAME=review_service_db
      - KAFKA_BROKERS=kafka:9092
      - NODE_ENV=development
    depends_on:
      - mongodb
      - kafka
    networks:
      - cab-network

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    environment:
      - PORT=3009
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cab_booking
    depends_on:
      - postgres
    networks:
      - cab-network

volumes:
  mongodb_data:
  postgres_data:
  redis_data:

networks:
  cab-network:
    driver: bridge
