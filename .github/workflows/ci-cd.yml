name: Cab Booking System CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-services:
    name: Setup & Test Node.js Services
    runs-on: ubuntu-latest
    
    # Ma trận (Matrix) cho phép GitHub chạy song song nhiều jobs cho từng service.
    # Nhờ vậy CI sẽ chạy rất nhanh thay vì chạy tuần tự từng cái một.
    strategy:
      matrix:
        service: 
          - api-gateway
          - auth-service
          - booking-service
          - driver-service
          - notification-service
          - payment-service
          - pricing-service
          - review-service
          - ride-service
          - user-service
      fail-fast: false # Nếu 1 service fail, các service khác vẫn chạy tiếp để báo cáo kết quả tổng thể.

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js v18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        # Caching giúp tiến trình npm install ở các lần sau nhanh hơn
        # cache: 'npm'
        # cache-dependency-path: services/${{ matrix.service }}/package-lock.json

    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Run Tests (Nếu được cấu hình)
      run: |
        # Chỉ chạy test nếu script test đã được định nghĩa thực sự trong package.json
        if grep -q '"test"' package.json && ! grep -q '"echo \\"Error: no test specified\\""' package.json; then
          npm test
        else
          echo "Bỏ qua test vì chưa có unit test cho ${{ matrix.service }}."
        fi

  # Bước Build Docker này độc lập, sẽ được chạy khi test pass. Thường dùng đẩy ảnh image lên Server.
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-services
    
    # Chỉ build image Docker khi có code đẩy thẳng vào nhánh main (không build cho Pull Request để tiếp kiệm tài nguyên)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    strategy:
      matrix:
        service: 
          - api-gateway
          - auth-service
          - booking-service
          - driver-service
          - notification-service
          - payment-service
          - pricing-service
          - review-service
          - ride-service
          - user-service
      fail-fast: false
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Ghi chú: Nếu hệ thống thật của bạn muốn đẩy image lên Github Registry (GHCR) hoặc DockerHub, hãy gỡ comment bên dưới.
    # - name: Log in to GitHub Container Registry
    #   uses: docker/login-action@v3
    #   with:
    #     registry: ghcr.io
    #     username: ${{ github.actor }}
    #     password: ${{ secrets.GITHUB_TOKEN }}
    # 
    # Hoặc DockerHub:
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image - ${{ matrix.service }}
      uses: docker/build-push-action@v5
      with:
        context: ./services/${{ matrix.service }}
        file: ./services/${{ matrix.service }}/Dockerfile
        
        # Đặt thành 'true' khi bạn đã Log in bên trên. Thành 'false' thì Github Actions chỉ build thử nghiệm CI đảm bảo Dockerfile không bị lỗi.
        push: false 
        
        tags: |
          ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
